name: Build Summoning Rite Releases

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create/update a GitHub Release and upload assets"
        required: true
        default: false
        type: boolean
      tag:
        description: "Release tag to publish when running manually"
        required: false
        type: string
      draft:
        description: "Create a draft release if the release does not already exist"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark a newly-created release as a prerelease"
        required: true
        default: true
        type: boolean
      move_tag:
        description: "Move the manual publish tag to this workflow commit before uploading assets"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Check out Arcana
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-summon-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-summon-build.txt

      - name: Build Summoning Rite binary
        run: python rites/build_summon_binary.py --clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: grimoire-summon-${{ matrix.os }}
          path: |
            dist/summon/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out Arcana
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          MOVE_TAG: ${{ inputs.move_tag }}
        run: |
          set -euo pipefail
          RELEASE_DRAFT="${RELEASE_DRAFT:-true}"
          RELEASE_PRERELEASE="${RELEASE_PRERELEASE:-false}"
          MOVE_TAG="${MOVE_TAG:-false}"

          if [[ -z "$RELEASE_TAG" ]]; then
            echo "Release tag is required for manual publish runs" >&2
            exit 1
          fi

          if [[ "$MOVE_TAG" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$RELEASE_TAG" --force
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            create_args=(--title "$RELEASE_TAG" --generate-notes --target "$GITHUB_SHA")
            if [[ "$RELEASE_DRAFT" == "true" ]]; then
              create_args+=(--draft)
            fi
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${create_args[@]}"
          fi

          gh release upload "$RELEASE_TAG" dist/release/* --clobber
