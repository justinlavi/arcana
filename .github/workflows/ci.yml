name: CI

# Mechanical quality gate: runs the pytest suite and the validator orchestrator
# on every pull request and on pushes to main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Ends of the supported range (pyproject requires-python = ">=3.9").
        python-version: ["3.9", "3.12"]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Run test suite
        run: python -m pytest -q

      - name: Run validator orchestrator
        run: python rites/validate.py
